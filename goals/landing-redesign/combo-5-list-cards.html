<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C5 — List-cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style> body{font-family:'Inter',system-ui,sans-serif} .mono{font-family:'JetBrains Mono',monospace} </style>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900 antialiased">
  <!--
    C5 — LIST-CARDS.  Keeps the current vertical list's density (one project per
    row, scannable) but each row is a card with hover Review/Annotate, a live
    count, branch, and a tidy path. The smallest leap from today: same shape,
    card polish + per-row actions. No select-then-launch step — act on the row.
  -->
  <div class="mx-auto max-w-2xl px-6 py-10">
    <div class="mb-8 flex items-center gap-2">
      <div class="grid size-7 place-items-center rounded-lg bg-violet-600 text-sm font-bold text-white">P</div>
      <span class="text-[15px] font-semibold tracking-tight">Plannotator</span>
      <button class="ml-auto text-[12px] text-zinc-400 hover:text-zinc-700">+ Add project</button>
    </div>

    <div class="mb-2 flex items-center justify-between">
      <span class="text-[11px] font-medium uppercase tracking-wider text-zinc-400">Projects</span>
      <input placeholder="Filter…" class="rounded-md border border-zinc-200 bg-white px-2 py-1 text-[11px] outline-none focus:border-violet-300" />
    </div>

    <div class="mb-8 space-y-2">
      <!-- row card -->
      <div class="group flex items-center gap-3 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 shadow-sm hover:border-zinc-300 hover:shadow-md">
        <svg class="size-4 shrink-0 text-violet-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2"><span class="text-[13px] font-semibold">plannotator</span><span class="text-[11px] text-zinc-400">feat/ui2-plan</span><span class="flex items-center gap-1 text-[11px] text-emerald-600"><span class="size-1.5 rounded-full bg-emerald-500"></span>3</span></div>
          <p class="mono truncate text-[11px] text-zinc-400">~/work/plannotator</p>
        </div>
        <div class="flex shrink-0 gap-1.5 opacity-0 transition group-hover:opacity-100">
          <button class="rounded-md bg-blue-50 px-2.5 py-1.5 text-[12px] font-medium text-blue-700 hover:bg-blue-100">Review</button>
          <button class="rounded-md bg-amber-50 px-2.5 py-1.5 text-[12px] font-medium text-amber-700 hover:bg-amber-100">Annotate</button>
        </div>
        <button class="shrink-0 rounded p-0.5 text-zinc-400 opacity-0 group-hover:opacity-100"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>

      <div class="group flex items-center gap-3 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 shadow-sm hover:border-zinc-300 hover:shadow-md">
        <svg class="size-4 shrink-0 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2"><span class="text-[13px] font-semibold">visual-explainer</span><span class="text-[11px] text-zinc-400">main</span></div>
          <p class="mono truncate text-[11px] text-zinc-400">~/oss/visual-explainer</p>
        </div>
        <div class="flex shrink-0 gap-1.5 opacity-0 transition group-hover:opacity-100">
          <button class="rounded-md bg-blue-50 px-2.5 py-1.5 text-[12px] font-medium text-blue-700 hover:bg-blue-100">Review</button>
          <button class="rounded-md bg-amber-50 px-2.5 py-1.5 text-[12px] font-medium text-amber-700 hover:bg-amber-100">Annotate</button>
        </div>
        <button class="shrink-0 rounded p-0.5 text-zinc-400 opacity-0 group-hover:opacity-100"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>

      <div class="group flex items-center gap-3 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 shadow-sm hover:border-zinc-300 hover:shadow-md">
        <svg class="size-4 shrink-0 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2"><span class="text-[13px] font-semibold">cmark-gfm</span><span class="text-[11px] text-zinc-400">master</span></div>
          <p class="mono truncate text-[11px] text-zinc-400">~/oss/cmark-gfm</p>
        </div>
        <div class="flex shrink-0 gap-1.5 opacity-0 transition group-hover:opacity-100">
          <button class="rounded-md bg-blue-50 px-2.5 py-1.5 text-[12px] font-medium text-blue-700 hover:bg-blue-100">Review</button>
          <button class="rounded-md bg-amber-50 px-2.5 py-1.5 text-[12px] font-medium text-amber-700 hover:bg-amber-100">Annotate</button>
        </div>
        <button class="shrink-0 rounded p-0.5 text-zinc-400 opacity-0 group-hover:opacity-100"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
    </div>

    <div class="mb-2 flex items-center justify-between">
      <span class="text-[11px] font-medium uppercase tracking-wider text-zinc-400">Active sessions</span>
      <a href="#" class="text-[12px] text-zinc-400 hover:text-zinc-700">History →</a>
    </div>
    <div class="overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-sm">
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 hover:bg-zinc-50"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-violet-100 px-1.5 py-0.5 text-[10px] font-medium text-violet-700">Plan</span><span class="flex-1 truncate text-[13px]">Real-time Collaboration</span><span class="text-[11px] text-zinc-400">2m</span></a>
      <a href="#" class="flex items-center gap-2.5 border-t border-zinc-100 px-3 py-2 hover:bg-zinc-50"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-blue-100 px-1.5 py-0.5 text-[10px] font-medium text-blue-700">Review</span><span class="flex-1 truncate text-[13px]">PR #832 · UI 2.0</span><span class="text-[11px] text-zinc-400">14m</span></a>
    </div>
    <p class="pt-8 text-center text-[11px] text-zinc-300">C5 — list-cards · smallest leap from current</p>
  </div>
</body>
</html>
