<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C3 — Refined current</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style> body{font-family:'Inter',system-ui,sans-serif} .mono{font-family:'JetBrains Mono',monospace} </style>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900 antialiased">
  <!--
    C3 (refines CURRENT).  Same mental model — select a project, then Launch —
    just tidied: checkmark selection, prettified paths, a calmer card list, and a
    clearer launch row that names what you're about to do. Minimal change.
  -->
  <div class="mx-auto max-w-2xl px-6 py-10">
    <div class="mb-8 flex items-center gap-2">
      <div class="grid size-7 place-items-center rounded-lg bg-violet-600 text-sm font-bold text-white">P</div>
      <span class="text-[15px] font-semibold tracking-tight">Plannotator</span>
      <button class="ml-auto text-[12px] text-zinc-400 hover:text-zinc-700">+ Add project</button>
    </div>

    <div class="mb-2 text-[11px] font-medium uppercase tracking-wider text-zinc-400">Select a project</div>
    <div class="mb-5 space-y-1.5">
      <!-- selected -->
      <button class="flex w-full items-center gap-3 rounded-xl border-2 border-violet-300 bg-violet-50/40 px-3.5 py-2.5 text-left">
        <span class="grid size-4 shrink-0 place-items-center rounded-full bg-violet-600 text-white"><svg class="size-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></span>
        <div class="min-w-0 flex-1"><div class="flex items-center gap-2"><span class="text-[13px] font-semibold">plannotator</span><span class="text-[11px] text-zinc-400">feat/ui2-plan</span></div><p class="mono truncate text-[11px] text-zinc-400">~/work/plannotator</p></div>
        <span class="flex items-center gap-1 text-[11px] text-emerald-600"><span class="size-1.5 rounded-full bg-emerald-500"></span>3</span>
      </button>
      <!-- unselected -->
      <button class="group flex w-full items-center gap-3 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 text-left hover:border-zinc-300">
        <span class="size-4 shrink-0 rounded-full border border-zinc-300 group-hover:border-zinc-400"></span>
        <div class="min-w-0 flex-1"><div class="text-[13px] font-semibold">visual-explainer</div><p class="mono truncate text-[11px] text-zinc-400">~/oss/visual-explainer</p></div>
        <span class="text-[11px] text-zinc-400">main</span>
      </button>
      <button class="group flex w-full items-center gap-3 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 text-left hover:border-zinc-300">
        <span class="size-4 shrink-0 rounded-full border border-zinc-300 group-hover:border-zinc-400"></span>
        <div class="min-w-0 flex-1"><div class="text-[13px] font-semibold">cmark-gfm</div><p class="mono truncate text-[11px] text-zinc-400">~/oss/cmark-gfm</p></div>
        <span class="text-[11px] text-zinc-400">master</span>
      </button>
    </div>

    <!-- launch row, names the target -->
    <div class="mb-8 flex items-center gap-2 rounded-xl border border-zinc-200 bg-white px-3.5 py-2.5 shadow-sm">
      <span class="text-[12px] text-zinc-500">Launch on <b class="text-zinc-900">plannotator</b></span>
      <div class="ml-auto flex gap-2">
        <button class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-blue-700"><svg class="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg> Review</button>
        <button class="inline-flex items-center gap-1.5 rounded-lg bg-amber-500 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-amber-600"><svg class="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 8h10M7 12h4m1 8-4-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-3z"/></svg> Annotate</button>
      </div>
    </div>

    <div class="mb-2 flex items-center justify-between">
      <span class="text-[11px] font-medium uppercase tracking-wider text-zinc-400">Active sessions</span>
      <a href="#" class="text-[12px] text-zinc-400 hover:text-zinc-700">History →</a>
    </div>
    <div class="overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-sm">
      <a href="#" class="flex items-center gap-2.5 px-3 py-2 hover:bg-zinc-50"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-violet-100 px-1.5 py-0.5 text-[10px] font-medium text-violet-700">Plan</span><span class="flex-1 truncate text-[13px]">Real-time Collaboration</span><span class="text-[11px] text-zinc-400">2m</span></a>
      <a href="#" class="flex items-center gap-2.5 border-t border-zinc-100 px-3 py-2 hover:bg-zinc-50"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-blue-100 px-1.5 py-0.5 text-[10px] font-medium text-blue-700">Review</span><span class="flex-1 truncate text-[13px]">PR #832 · UI 2.0</span><span class="text-[11px] text-zinc-400">14m</span></a>
      <a href="#" class="flex items-center gap-2.5 border-t border-zinc-100 px-3 py-2 hover:bg-zinc-50"><span class="size-1.5 rounded-full bg-zinc-300"></span><span class="rounded bg-amber-100 px-1.5 py-0.5 text-[10px] font-medium text-amber-700">Annotate</span><span class="flex-1 truncate text-[13px]">README.md · visual-explainer</span><span class="text-[11px] text-zinc-400">1h</span></a>
    </div>
    <p class="pt-8 text-center text-[11px] text-zinc-300">C3 — refined current · select → launch</p>
  </div>
</body>
</html>
