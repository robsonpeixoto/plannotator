<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C4 — Card grid + drill-down (refines C2)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style> body{font-family:'Inter',system-ui,sans-serif} .mono{font-family:'JetBrains Mono',monospace} </style>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900 antialiased">
  <!--
    C4 (refines C2).  Cleaner card grid. Root card = name, path, live count, quick
    Review/Annotate. A card opens to a tidy worktrees / PRs panel (segmented), each
    line launchable. Active sessions ride along the top as a thin strip.
  -->
  <header class="border-b border-zinc-200 bg-white">
    <div class="mx-auto flex max-w-4xl items-center gap-3 px-6 py-3">
      <div class="grid size-6 place-items-center rounded-md bg-violet-600 text-xs font-bold text-white">P</div>
      <span class="text-[14px] font-semibold tracking-tight">Plannotator</span>
      <input placeholder="Search projects…" class="ml-3 w-56 rounded-lg border border-zinc-200 bg-white px-3 py-1.5 text-[12px] outline-none focus:border-violet-300" />
      <a href="#" class="ml-auto text-[12px] text-zinc-500 hover:text-zinc-800">History →</a>
      <button class="rounded-lg bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">+ Add</button>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-6">
    <!-- thin active strip -->
    <div class="mb-5 flex flex-wrap items-center gap-2">
      <span class="text-[11px] font-medium uppercase tracking-wider text-zinc-400">Active</span>
      <a href="#" class="inline-flex items-center gap-2 rounded-full border border-zinc-200 bg-white py-1 pl-2 pr-3 text-[12px] shadow-sm hover:border-zinc-300"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-violet-100 px-1.5 py-0.5 text-[10px] font-medium text-violet-700">Plan</span> Real-time Collaboration</a>
      <a href="#" class="inline-flex items-center gap-2 rounded-full border border-zinc-200 bg-white py-1 pl-2 pr-3 text-[12px] shadow-sm hover:border-zinc-300"><span class="size-1.5 rounded-full bg-emerald-500"></span><span class="rounded bg-blue-100 px-1.5 py-0.5 text-[10px] font-medium text-blue-700">Review</span> PR #832</a>
    </div>

    <h2 class="mb-3 text-[11px] font-medium uppercase tracking-wider text-zinc-400">Projects</h2>
    <div class="grid grid-cols-1 gap-3 lg:grid-cols-2">

      <!-- expanded -->
      <div class="overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-sm lg:row-span-2">
        <div class="p-4">
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-2"><svg class="size-4 text-violet-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="text-[15px] font-semibold">plannotator</span></div>
            <span class="flex items-center gap-1 text-[11px] text-emerald-600"><span class="size-1.5 animate-pulse rounded-full bg-emerald-500"></span>3</span>
          </div>
          <p class="mono mt-1.5 truncate text-[11px] text-zinc-400">~/work/plannotator · feat/ui2-plan</p>
          <div class="mt-3 flex gap-2">
            <button class="flex-1 rounded-lg bg-blue-600 py-2 text-[12px] font-medium text-white hover:bg-blue-700">Review</button>
            <button class="flex-1 rounded-lg bg-amber-500 py-2 text-[12px] font-medium text-white hover:bg-amber-600">Annotate</button>
          </div>
        </div>
        <div class="border-t border-zinc-100 bg-zinc-50/70 p-3">
          <div class="mb-1.5 inline-flex gap-0.5 rounded-lg bg-zinc-100 p-0.5 text-[11px]"><span class="rounded-md bg-white px-2 py-0.5 font-medium shadow-sm">Worktrees</span><span class="px-2 py-0.5 text-zinc-500">PRs · 4</span></div>
          <div class="space-y-0.5 text-[12px]">
            <div class="group flex items-center gap-2 rounded-md px-2 py-1.5 hover:bg-white"><span class="text-zinc-400">⌥</span><span class="flex-1 truncate">feat/folder-annotate</span><span class="flex gap-1 opacity-0 group-hover:opacity-100"><span class="rounded bg-blue-50 px-1.5 py-0.5 text-[10px] text-blue-700">Review</span><span class="rounded bg-amber-50 px-1.5 py-0.5 text-[10px] text-amber-700">Annotate</span></span></div>
            <div class="group flex items-center gap-2 rounded-md px-2 py-1.5 hover:bg-white"><span class="text-zinc-400">⌥</span><span class="flex-1 truncate">feat/ui2-code-review</span><span class="flex gap-1 opacity-0 group-hover:opacity-100"><span class="rounded bg-blue-50 px-1.5 py-0.5 text-[10px] text-blue-700">Review</span><span class="rounded bg-amber-50 px-1.5 py-0.5 text-[10px] text-amber-700">Annotate</span></span></div>
          </div>
        </div>
      </div>

      <!-- collapsed -->
      <div class="group rounded-xl border border-zinc-200 bg-white p-4 shadow-sm hover:border-zinc-300">
        <div class="flex items-center justify-between"><div class="flex items-center gap-2"><svg class="size-4 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="text-[14px] font-semibold">visual-explainer</span></div><svg class="size-4 text-zinc-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
        <p class="mono mt-1.5 truncate text-[11px] text-zinc-400">~/oss/visual-explainer</p>
        <div class="mt-3 flex gap-2 opacity-0 transition group-hover:opacity-100"><button class="flex-1 rounded-lg bg-blue-50 py-1.5 text-[12px] font-medium text-blue-700">Review</button><button class="flex-1 rounded-lg bg-amber-50 py-1.5 text-[12px] font-medium text-amber-700">Annotate</button></div>
      </div>
      <div class="group rounded-xl border border-zinc-200 bg-white p-4 shadow-sm hover:border-zinc-300">
        <div class="flex items-center justify-between"><div class="flex items-center gap-2"><svg class="size-4 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="text-[14px] font-semibold">cmark-gfm</span></div><svg class="size-4 text-zinc-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div>
        <p class="mono mt-1.5 truncate text-[11px] text-zinc-400">~/oss/cmark-gfm</p>
        <div class="mt-3 flex gap-2 opacity-0 transition group-hover:opacity-100"><button class="flex-1 rounded-lg bg-blue-50 py-1.5 text-[12px] font-medium text-blue-700">Review</button><button class="flex-1 rounded-lg bg-amber-50 py-1.5 text-[12px] font-medium text-amber-700">Annotate</button></div>
      </div>
    </div>
  </main>
</body>
</html>
